x-common:
  database:
    # Do not remove the "&db-password" from the end of the line below, it is important
    # for Panel functionality.
    &db-environment
    MYSQL_PASSWORD: &db-password "${DB_PASSWORD}"
    MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
  # Eliminados los bloques &panel-environment y &mail-environment
  # porque confunden y sobreescriben al archivo .env principal.

  #
  # ------------------------------------------------------------------------------------------
  # DANGER ZONE BELOW
  #
  # The remainder of this file likely does not need to be changed. Please only make modifications
  # below if you understand what you are doing.
  #
services:
  database:
    image: mariadb:10.5
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - "/srv/pterodactyl/database:/var/lib/mysql"
    environment:
      <<: *db-environment
      MYSQL_DATABASE: "panel"
      MYSQL_USER: "pterodactyl"

  cache:
    image: redis:alpine
    restart: always

  panel:
    # Usamos la imagen generada por tu workflow de GitHub
    image: ghcr.io/dank1775/pterodactyl-custom:latest
    restart: always
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    links:
      - database
      - cache
    volumes:
      - "/srv/pterodactyl/var/:/app/var/"
      - "/srv/pterodactyl/logs/:/app/storage/logs"
      - "/srv/pterodactyl/.env:/app/.env"
      # Monta los certificados de Cloudflare al contenedor para usar SSL internamente.
      # Renombra o asegúrate de que sean "cert.pem" y "key.pem" en /etc/certs del servidor base.
      - "/etc/certs:/etc/certs:ro"
    # Hemos eliminado la inyección repetitiva de environment: <<: [ *panel-environment, *mail-environment ]
    # Ahora dejará que /app/.env (montado arriba como bind) sea la única fuente de la verdad para Laravel.
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_ENV=${APP_ENV:-production}
      - APP_ENVIRONMENT_ONLY=${APP_ENVIRONMENT_ONLY:-false}
      - REDIS_HOST=${REDIS_HOST:-cache}
      - DB_HOST=${DB_HOST:-database}
      - DB_PORT=${DB_PORT:-3306}

