services:
  database:
    image: mariadb:10.5
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - "./data/database:/var/lib/mysql"
    environment:
      MYSQL_PASSWORD: "pterodactyl_secret_pw"
      MYSQL_ROOT_PASSWORD: "pterodactyl_secret_pw"
      MYSQL_DATABASE: "panel"
      MYSQL_USER: "pterodactyl"

  cache:
    image: redis:alpine
    restart: always

  panel:
    # Usamos la imagen generada por tu workflow de GitHub
    image: ghcr.io/dank1775/pterodactyl-custom:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    links:
      - database
      - cache
    volumes:
      - "./data/var/:/app/var/"
      - "./data/logs/:/app/storage/logs"
      - "./.env:/app/.env"
      # Montar entrypoint local para poder actualizarlo sin rebuild de imagen
      - "./entrypoint.sh:/entrypoint.sh"
      # Monta los certificados de Cloudflare al contenedor para usar SSL internamente.
      # Renombra o asegúrate de que sean "cert.pem" y "key.pem" en ./data/certs del servidor base.
      - "./data/certs:/etc/certs:ro"
    # Hemos eliminado la inyección repetitiva de environment: <<: [ *panel-environment, *mail-environment ]
    # Ahora dejará que /app/.env (montado arriba como bind) sea la única fuente de la verdad para Laravel.
    environment:
      DB_PASSWORD: "pterodactyl_secret_pw"
      APP_ENV: "production"
      APP_ENVIRONMENT_ONLY: "false"
      REDIS_HOST: "cache"
      DB_HOST: "database"
      DB_PORT: "3306"

